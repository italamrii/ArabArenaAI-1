# ArabArenaAI-1 Benchmark — Summarization
benchmark_version: "0.1.0"
benchmark_name: summarization
description: |
  Condense Arabic (and mixed Arabic–English) passages into faithful summaries.
  Penalizes hallucinated facts not present in source text.
scoring_method: |
  ROUGE-L vs reference + rubric (consistency, omission, hallucination).
  −1.0 rubric penalty per unsupported factual claim in output.
evaluation_type: summarization
language: ar
item_count: 25

sample_questions:
  - id: sum-001
    sub_domain: news
    difficulty: easy
    question: |
      Source: «افتتحت وزارة التجارة مكتباً جديداً في الرياض لخدمة رواد الأعمال. يقدم المكتب استشارات تسجيل الشركات وربط المستثمرين. ساعات العمل من الأحد إلى الخميس.»
      Summarize in 2 Arabic bullets.
    gold_answer: |
      - افتتاح مكتب وزارة التجارة في الرياض لدعم رواد الأعمال.
      - خدمات: استشارات تسجيل شركات وربط مستثمرين؛ الدوام أحد–خميس.

  - id: sum-002
    sub_domain: business
    difficulty: medium
    question: |
      Source: «أعلنت الشركة عن نمو إيراداتها 18% year-on-year مع ارتفاع churn إلى 4%. ت plans hiring in sales.»
      Executive summary (3 sentences, formal Arabic).
    gold_answer: "نمو إيرادات 18% سنوياً؛ churn 4%؛ plans hiring in sales — formal Arabic summary."

  - id: sum-003
    sub_domain: vision2030
    difficulty: medium
    question: |
      Source: «رؤية 2030 تهدف لتنويع الاقتصاد، تمكين المواطنين، وجعل المملكة hub logistics.»
      Summarize in one Arabic paragraph.
    gold_answer: "رؤية 2030: diversify economy، empower citizens، logistics hub."

  - id: sum-004
    sub_domain: news
    difficulty: easy
    question: |
      Source: «أطلقت المنصة ميزة الدفع الإلكتروني أمس. الميزة available للمستخدمين في الرياض فقط حالياً.»
      One-sentence summary.
    gold_answer: "إطلاق ميزة دفع إلكتروني أمس، available الرياض initially."

  - id: sum-005
    sub_domain: business
    difficulty: hard
    question: |
      Source: «Board approved $5M budget for AI lab in Dammam over 3 years focusing NLP and speech.»
      Arabic bullet summary (3 bullets).
    gold_answer: "موافقة مجلس على budget 5M$ لم lab AI في الدمام 3 سنوات؛ تركيز NLP وspeech."

  - id: sum-006
    sub_domain: mixed
    difficulty: medium
    question: |
      Source: «uses Kubernetes on AWS EKS with Terraform IaC. الفريق Saudi-based.»
      Summarize preserving technical terms.
    gold_answer: "Kubernetes on AWS EKS + Terraform IaC؛ فريق سعودي."

  - id: sum-007
    sub_domain: news
    difficulty: medium
    question: |
      Source: «بلغ مؤشر تداول مستوى records Q1 amid rising oil prices and IPO activity.»
      2-sentence Arabic summary.
    gold_answer: "Tadawul records Q1؛ factors: oil prices، IPO activity."

  - id: sum-008
    sub_domain: business
    difficulty: easy
